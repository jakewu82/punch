<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CRM 名單管理</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <header class="header">
      <h1>CRM 名單管理</h1>
      <p>資料暫存在本機 24 小時，可匯出 CSV</p>
    </header>

    <section class="card">
      <h2 id="formTitle">新增名單</h2>
      <form id="crmForm">
        <div class="grid">
          <label>
            公司 / 姓名
            <input type="text" id="name" placeholder="請輸入公司或姓名" required />
          </label>

          <label>
            電話
            <input type="text" id="phone" placeholder="請輸入電話" />
          </label>

          <label class="full">
            地址
            <input type="text" id="address" placeholder="請輸入地址" />
          </label>

          <label>
            狀態
            <select id="status">
              <option value="未聯絡">未聯絡</option>
              <option value="已聯絡">已聯絡</option>
              <option value="追蹤中">追蹤中</option>
              <option value="有興趣">有興趣</option>
              <option value="已成交">已成交</option>
              <option value="無意願">無意願</option>
            </select>
          </label>

          <label>
            備註
            <input type="text" id="note" placeholder="可填備註" />
          </label>
        </div>

        <div class="actions">
          <button type="submit" class="primary" id="submitBtn">儲存名單</button>
          <button type="button" class="secondary" id="cancelEditBtn">取消編輯</button>
          <button type="button" class="secondary" id="exportCsvBtn">匯出 CSV</button>
          <button type="button" class="danger ghost" id="clearAllBtn">清空全部</button>
        </div>
      </form>
      <p class="hint" id="storageHint"></p>
    </section>

    <section class="card">
      <div class="toolbar">
        <input type="text" id="searchInput" placeholder="搜尋公司 / 電話 / 地址 / 備註" />
        <select id="filterStatus">
          <option value="">全部狀態</option>
          <option value="未聯絡">未聯絡</option>
          <option value="已聯絡">已聯絡</option>
          <option value="追蹤中">追蹤中</option>
          <option value="有興趣">有興趣</option>
          <option value="已成交">已成交</option>
          <option value="無意願">無意願</option>
        </select>
      </div>

      <div class="stats" id="stats"></div>

      <div id="emptyState" class="empty">目前沒有名單資料</div>
      <div id="list" class="list"></div>
    </section>
  </div>

  <script src="script.js"></script>
</body>
</html>
