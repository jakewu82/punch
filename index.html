<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>簡單資料提交</title>
</head>
<body>
  <h1>測試資料寫入</h1>
  <div>
    <label for="name">名稱：</label>
    <input type="text" id="name" placeholder="請輸入名稱">
  </div>
  <div>
    <label for="message">訊息：</label>
    <input type="text" id="message" placeholder="請輸入訊息">
  </div>
  <button id="submitButton">提交</button>
  <p id="status"></p>

  <script>
    const API_URL = 'YOUR_GOOGLE_APPS_SCRIPT_URL';  // 請將此處替換為你的 Google Apps Script URL

    document.getElementById('submitButton').addEventListener('click', () => {
      const name = document.getElementById('name').value.trim();
      const message = document.getElementById('message').value.trim();

      if (!name || !message) {
        alert('請輸入名稱和訊息');
        return;
      }

      // 傳送 POST 請求
      fetch(API_URL, {
        method: 'POST',
        body: JSON.stringify({ name: name, message: message }),
        headers: { 'Content-Type': 'application/json' }
      })
      .then(response => {
        if (!response.ok) {
          throw new Error('網路錯誤，請稍後再試');
        }
        return response.json();
      })
      .then(data => {
        if (data.result === 'success') {
          document.getElementById('status').textContent = '資料已成功寫入！';
        } else {
          document.getElementById('status').textContent = '發生錯誤：' + data.message;
        }
      })
      .catch(error => {
        console.error('錯誤:', error);
        document.getElementById('status').textContent = '發生錯誤，請檢查控制台';
      });
    });
  </script>
</body>
</html>
